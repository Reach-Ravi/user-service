apiVersion: v1
kind: Namespace
metadata:
  name: user-app

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-boot-k8s-deployment
spec:
  selector:
    matchLabels:
      app: spring-boot-k8s
  replicas: 4
  template:
    metadata:
      labels:
        app: spring-boot-k8s
    spec:
      containers:
        - name: user-app-container
          image: user-service:1.0.0-5
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9191


---
apiVersion: v1
kind: Service
metadata:
  name: user-app-svc
spec:
  selector:
    app: spring-boot-k8s
  ports:
    - protocol: TCP
      port: 9090
      targetPort: 9191
  type: NodePort